name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  universal-debug:
    name: Universal debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 14742923
          packages: 'platform-tools platforms;android-36 build-tools;36.1.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Environment diagnostics
        run: |
          java -version
          ./gradlew --version
          sdkmanager --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          sdkmanager --list_installed

      - name: Build universal debug APK
        run: |
          ./gradlew assembleLawnWithQuickstepGithubDebug \
            --stacktrace \
            --no-daemon \
            --warning-mode all

      # The Gradle variant name (lawnWithQuickstepGithub) is intentionally kept
      # to preserve upstream rebase compatibility; only the published artifact is
      # given Elyra "universal debug" naming.
      - name: Locate APK
        shell: bash
        run: |
          set -euo pipefail

          APK="$(find build/outputs/apk/lawnWithQuickstepGithub/debug \
            -maxdepth 1 \
            -type f \
            -name '*.apk' \
            -print \
            -quit)"

          if [ -z "${APK}" ]; then
            echo "::error::Universal debug APK was not produced."
            exit 1
          fi

          test -s "${APK}"
          echo "APK_PATH=${APK}" >> "$GITHUB_ENV"
          ls -lh "${APK}"

      - name: Run debug lint
        run: |
          ./gradlew lintLawnWithQuickstepGithubDebug \
            --stacktrace \
            --no-daemon \
            --warning-mode all

      - name: Run debug unit tests
        run: |
          ./gradlew testLawnWithQuickstepGithubDebugUnitTest \
            --stacktrace \
            --no-daemon \
            --warning-mode all

      - name: Upload universal debug APK
        uses: actions/upload-artifact@v7
        with:
          name: elyra-launcher-universal-debug
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: elyra-launcher-universal-debug-reports
          path: |
            build/reports/**
            **/build/reports/**
          if-no-files-found: warn
          retention-days: 14

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  universal-debug:
    name: Universal debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK components
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.1.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build universal debug APK
        run: ./gradlew assembleLawnWithQuickstepGithubDebug --stacktrace --no-daemon

      # The Gradle variant name (lawnWithQuickstepGithub) is intentionally kept
      # to preserve upstream rebase compatibility; only the published artifact is
      # given Elyra "universal debug" naming.
      - name: Stage universal debug APK
        run: |
          mkdir -p artifacts
          cp build/outputs/apk/lawnWithQuickstepGithub/debug/*.apk \
            artifacts/elyra-launcher-universal-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elyra-launcher-universal-debug
          path: artifacts/elyra-launcher-universal-debug.apk
          if-no-files-found: warn

      - name: Run debug unit tests
        run: ./gradlew testLawnWithQuickstepGithubDebugUnitTest --stacktrace --no-daemon

      - name: Run debug lint
        run: ./gradlew lintLawnWithQuickstepGithubDebug --stacktrace --no-daemon

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elyra-launcher-universal-debug-reports
          path: |
            build/reports/**
            **/build/reports/**
          if-no-files-found: ignore
